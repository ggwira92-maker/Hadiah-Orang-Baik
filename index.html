<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You, Keysia</title>
    <style>
        :root {
            --bg-dark: #040613;
            --pink-glow: #ff4d6d;
            --blue-glow: #38bdf8;
            --text-light: #f1f5f9;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #161129 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* Latar Belakang Love yang Ramai Bergerak Otomatis */
        .bg-hearts {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            bottom: -50px;
            pointer-events: none;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.6) rotate(0deg); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.6; }
            100% { transform: translateY(-115vh) scale(1.3) rotate(360deg); opacity: 0; }
        }

        /* Canvas Ledakan Kembang Api Love */
        canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .container {
            z-index: 10;
            padding: 20px;
            width: 85%;
            max-width: 420px;
        }

        .aesthetic-btn {
            background: linear-gradient(45deg, var(--pink-glow), var(--blue-glow));
            color: #ffffff;
            border: none;
            padding: 16px 36px;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.4s ease;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.5);
            -webkit-tap-highlight-color: transparent;
        }

        .aesthetic-btn:hover {
            box-shadow: 0 0 35px rgba(255, 77, 109, 0.8);
            transform: scale(1.05);
        }

        #letter-box {
            display: none;
            background: rgba(4, 6, 19, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 35px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 77, 109, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 30px rgba(255, 77, 109, 0.15);
        }

        .profile-frame {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--pink-glow), var(--blue-glow));
            margin: 0 auto 25px auto;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.5);
            opacity: 0;
            transform: scale(0.8);
            transition: all 1s ease 0.3s;
        }

        .profile-inner { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; }

        h1 {
            font-size: 24px;
            background: linear-gradient(45deg, #ff9ebb, #9cd4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 22px;
            font-weight: 700;
        }

        .text-content {
            font-size: 15px;
            line-height: 1.9;
            color: #cbd5e1;
            text-align: justify;
            text-justify: inter-word;
            min-height: 160px;
        }

        .closing {
            margin-top: 25px;
            font-size: 14px;
            color: var(--blue-glow);
            text-shadow: 0 0 10px rgba(82, 183, 255, 0.6);
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
    </style>
</head>
<body>

    <!-- Wadah Latar Belakang Love Ramai -->
    <div class="bg-hearts" id="bgHearts"></div>

    <!-- Canvas Efek Ledakan Kembang Api Love -->
    <canvas id="fireworksCanvas"></canvas>
    
    <!-- AUDIO SISTEM -->
    <audio id="bgMusic" src="Rahasia Hati - NIDJI LIRIK.mp3" loop preload="auto"></audio>

    <div class="container">
        <!-- Tampilan Awal -->
        <div id="start-box">
            <p style="color: #64748b; letter-spacing: 4px; margin-bottom: 30px; font-size: 12px; text-transform: uppercase;">A Private Message for Keysia</p>
            <button class="aesthetic-btn" onclick="revealLetter()">Open Message & Music</button>
        </div>

        <!-- Tampilan Surat Elegan -->
        <div id="letter-box">
            <div class="profile-frame" id="user-photo">
                <div class="profile-inner">
                    <video src="VID-20260524-WA0007.mp4" autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
                </div>
            </div>
            
            <h1>Good Night, Keysia</h1>
            <div class="text-content" id="typed-text"></div>
            <div class="closing" id="closing-text">I love you. Always. 🤍</div>
        </div>
    </div>

    <script>
        const message = "Keysia, malam ini aku ingin menyampaikan sesuatu yang mungkin jarang terucap. Terima kasih sudah menjadi bagian dari hariku, menjadi alasan untuk aku tersenyum kembali setelah hari yang panjang. Kamu hebat hari ini, dan aku sangat menghargai setiap langkah yang kamu buat. Sekarang, istirahatkan dirimu, biarkan malam ini memeluk lelahmu. Tidurlah dengan tenang, bermimpilah tentang hal-hal indah, karena kamu layak mendapatkan kedamaian itu malam ini. Selamat istirahat, sayang.";
        
        let index = 0;
        function typeWriter() {
            if (index < message.length) {
                document.getElementById("typed-text").innerHTML += message.charAt(index);
                index++;
                setTimeout(typeWriter, 55);
            } else {
                document.getElementById("closing-text").style.opacity = "1";
            }
        }

        function revealLetter() {
            // Memaksa musik berjalan secara maksimal
            const music = document.getElementById('bgMusic');
            music.load(); 
            music.play().catch(e => {
                console.log("Mencoba alternatif play...");
                // Paksa putar ulang jika gagal
                setTimeout(() => { music.play(); }, 100);
            });

            document.getElementById('start-box').style.display = 'none';
            const letter = document.getElementById('letter-box');
            letter.style.display = 'block';
            
            const photo = document.getElementById('user-photo');
            photo.style.opacity = '1';
            photo.style.transform = 'scale(1)';
            
            setTimeout(typeWriter, 1000);
            setInterval(autoFirework, 1300);
        }

        // ================= RAMAIKAN LATAR BELAKANG DENGAN LOVE PARTIKEL =================
        const bgContainer = document.getElementById('bgHearts');
        const heartSymbols = ['💖', '🤍', '💙', '💝', '✨'];
        
        function spawnBgHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's'; // dipercepat biar lebih ramai mengalir
            heart.style.fontSize = Math.random() * 15 + 12 + 'px';
            bgContainer.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 7000);
        }
        // Loop awal biar langsung ramai
        for(let i=0; i<20; i++) { setTimeout(spawnBgHeart, Math.random()*3000); }
        setInterval(spawnBgHeart, 250); // Selalu melahirkan love baru setiap 0.25 detik

        // ================= KEMBANG API LEDAKAN LOVE (CANVAS) =================
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particles = [];
        const explosionColors = ['#ff4d6d', '#ff758f', '#38bdf8', '#7dd3fc', '#ffffff'];

        class HeartParticle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 5 + 2;
                this.velocity = { x: Math.cos(this.angle) * this.speed, y: Math.sin(this.angle) * this.speed };
                this.opacity = 1;
                this.fade = Math.random() * 0.015 + 0.01;
                this.size = Math.random() * 8 + 6; // Diperbesar ukurannya
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.translate(this.x, this.y);
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size/2, -this.size/2, -this.size, -this.size/4, -this.size, this.size/4);
                ctx.bezierCurveTo(-this.size, this.size*0.7, -this.size/4, this.size*0.8, 0, this.size);
                ctx.bezierCurveTo(this.size/4, this.size*0.8, this.size, this.size*0.7, this.size, this.size/4);
                ctx.bezierCurveTo(this.size, -this.size/4, this.size/2, -this.size/2, 0, 0);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.velocity.y += 0.02; 
                this.opacity -= this.fade;
            }
        }

        function createExplosion(x, y) {
            const count = 25; // Ditambah jumlah ledakannya
            for (let i = 0; i < count; i++) {
                const col = explosionColors[Math.floor(Math.random() * explosionColors.length)];
                particles.push(new HeartParticle(x, y, col));
            }
        }

        function autoFirework() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.5) + (canvas.height * 0.1);
            createExplosion(x, y);
        }

        window.addEventListener('click', (e) => {
            if(document.getElementById('start-box').style.display === 'none') {
                createExplosion(e.clientX, e.clientY);
            }
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.opacity > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
