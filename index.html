<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You, Keysia</title>
    <style>
        :root {
            --bg-dark: #070b19;
            --pink-glow: #ff758f;
            --blue-glow: #52b7ff;
            --text-light: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #10172a 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* Canvas untuk Kembang Api Love */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            z-index: 10;
            padding: 20px;
            width: 85%;
            max-width: 420px;
        }

        #start-box {
            display: block;
            animation: fadeIn 1s ease-in-out;
        }

        /* Tombol Tema Pink-Biru */
        .aesthetic-btn {
            background: transparent;
            color: #ffffff;
            border: 2px solid var(--pink-glow);
            padding: 14px 32px;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(255, 117, 143, 0.2), inset 0 0 10px rgba(82, 183, 255, 0.2);
            -webkit-tap-highlight-color: transparent;
        }

        .aesthetic-btn:hover, .aesthetic-btn:active {
            background: linear-gradient(45deg, var(--pink-glow), var(--blue-glow));
            border-color: transparent;
            box-shadow: 0 0 25px rgba(255, 117, 143, 0.6);
            transform: scale(1.03);
        }

        #letter-box {
            display: none;
            background: rgba(7, 11, 25, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 117, 143, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(82, 183, 255, 0.1);
        }

        /* Bingkai Video dengan Gradasi Pink-Biru */
        .profile-frame {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(45deg, var(--pink-glow), var(--blue-glow));
            margin: 0 auto 20px auto;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(255, 117, 143, 0.4);
            opacity: 0;
            transform: scale(0.8);
            transition: all 1s ease 0.3s;
        }

        .profile-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
        }

        h1 {
            font-size: 24px;
            background: linear-gradient(45deg, #ff9ebb, #9cd4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .text-content {
            font-size: 15px;
            line-height: 1.8;
            color: #e2e8f0;
            min-height: 140px;
            text-align: justify;
            text-justify: inter-word;
        }

        .closing {
            margin-top: 25px;
            font-size: 14px;
            color: var(--blue-glow);
            text-shadow: 0 0 10px rgba(82, 183, 255, 0.5);
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Canvas Efek Kembang Api -->
    <canvas id="fireworksCanvas"></canvas>

    <!-- Elemen Musik yang Disesuaikan dengan File Kamu -->
    <audio id="bgMusic" src="TULUS - Monokrom (Official Music Video).mp3" loop></audio>

    <div class="container">
        <!-- Tampilan Awal -->
        <div id="start-box">
            <p style="color: #94a3b8; font-size: 13px; letter-spacing: 3px; margin-bottom: 25px; text-transform: uppercase;">A Private Message for Keysia</p>
            <button class="aesthetic-btn" onclick="revealLetter()">Open Message & Music</button>
        </div>

        <!-- Tampilan Surat Elegan -->
        <div id="letter-box">
            <!-- Bagian Video Kamu -->
            <div class="profile-frame" id="user-photo">
                <div class="profile-inner">
                    <video src="VID-20260524-WA0007.mp4" autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
                </div>
            </div>
            
            <h1>Good Night, Keysia</h1>
            <div class="text-content" id="typed-text"></div>
            <div class="closing" id="closing-text">I love you, always. 🤍</div>
        </div>
    </div>

    <script>
        const message = "Terima kasih untuk hari ini ya, Keysia sayangku, cintaku, manisku. Hari ini kamu sudah melangkah dengan hebat. Sekarang, saatnya tubuh dan pikiranmu beristirahat sepenuhnya. Lepaskan semua lelahmu malam ini. Tutup matamu perlahan, bbo yang nyenyak ya. Semoga tidurmu tenang dan malammu dipenuhi dengan mimpi-mimpi yang indah.";
        
        let index = 0;
        const speed = 40; 

        function typeWriter() {
            if (index < message.length) {
                document.getElementById("typed-text").innerHTML += message.charAt(index);
                index++;
                setTimeout(typeWriter, speed);
            } else {
                document.getElementById("closing-text").style.opacity = "1";
            }
        }

        function revealLetter() {
            // Putar Musik Tulus
            const music = document.getElementById('bgMusic');
            music.play().catch(error => console.log("Autoplay diblokir:", error));

            document.getElementById('start-box').style.display = 'none';
            const letter = document.getElementById('letter-box');
            letter.style.display = 'block';
            letter.style.animation = 'fadeIn 1.5s ease-in-out forwards';
            
            const photo = document.getElementById('user-photo');
            photo.style.opacity = '1';
            photo.style.transform = 'scale(1)';
            
            setTimeout(typeWriter, 1000);
            
            // Siklus kembang api love otomatis
            setInterval(autoFirework, 1500);
        }

        // ================= MESIN KEMBANG API HATI (CANVAS) =================
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particles = [];
        const colors = ['#ff758f', '#ff7f9d', '#52b7ff', '#74c7ff', '#ffffff'];

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 4 + 2;
                this.velocity = {
                    x: Math.cos(this.angle) * this.speed,
                    y: Math.sin(this.angle) * this.speed
                };
                this.opacity = 1;
                this.fade = Math.random() * 0.015 + 0.01;
                this.size = Math.random() * 8 + 6;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.translate(this.x, this.y);
                
                // Menggambar Bentuk Hati
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size/2, -this.size/2, -this.size, -this.size/4, -this.size, this.size/4);
                ctx.bezierCurveTo(-this.size, this.size*0.7, -this.size/4, this.size*0.8, 0, this.size);
                ctx.bezierCurveTo(this.size/4, this.size*0.8, this.size, this.size*0.7, this.size, this.size/4);
                ctx.bezierCurveTo(this.size, -this.size/4, this.size/2, -this.size/2, 0, 0);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }

            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.velocity.y += 0.04; 
                this.opacity -= this.fade;
            }
        }

        function createExplosion(x, y) {
            const particleCount = 25;
            for (let i = 0; i < particleCount; i++) {
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                particles.push(new Particle(x, y, randomColor));
            }
        }

        function autoFirework() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.6) + (canvas.height * 0.1);
            createExplosion(x, y);
        }

        // Kembang api muncul kalau layarnya diklik/ditap
        window.addEventListener('click', (e) => {
            if(document.getElementById('start-box').style.display === 'none') {
                createExplosion(e.clientX, e.clientY);
            }
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.opacity > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
