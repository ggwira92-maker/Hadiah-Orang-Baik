<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You, Keysia</title>
    <style>
        :root {
            --bg-color: #090d16;
            --accent-gold: #e2b659;
            --text-light: #f8fafc;
            --heart-color: rgba(244, 63, 94, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #111827 0%, var(--bg-color) 100%);
            color: var(--text-light);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* Container Utama */
        .container {
            z-index: 10;
            padding: 20px;
            width: 85%;
            max-width: 420px;
        }

        /* Halaman Awal - Tombol Elegan */
        #start-box {
            display: block;
            animation: fadeIn 1s ease-in-out;
        }

        .gold-btn {
            background: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 14px 28px;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(226, 182, 89, 0.1);
            -webkit-tap-highlight-color: transparent;
        }

        .gold-btn:hover, .gold-btn:active {
            background: var(--accent-gold);
            color: var(--bg-color);
            box-shadow: 0 0 25px rgba(226, 182, 89, 0.4);
        }

        /* Halaman Surat Premium */
        #letter-box {
            display: none;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 35px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 24px;
            color: var(--accent-gold);
            margin-bottom: 25px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .text-content {
            font-size: 15px;
            line-height: 1.8;
            color: #cbd5e1;
            min-height: 150px;
            text-align: justify;
            text-justify: inter-word;
        }

        .closing {
            margin-top: 30px;
            font-size: 14px;
            color: var(--accent-gold);
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* Efek Animasi Hati Lembut */
        .heart-particle {
            position: absolute;
            bottom: -10px;
            font-size: 20px;
            color: var(--heart-color);
            pointer-events: none;
            animation: floatUp linear infinite;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-105vh) rotate(360deg); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Tampilan Awal -->
        <div id="start-box">
            <p style="color: #64748b; font-size: 13px; letter-spacing: 3px; margin-bottom: 25px; text-transform: uppercase;">A Private Message for Keysia</p>
            <button class="gold-btn" onclick="revealLetter()">Open Message</button>
        </div>

        <!-- Tampilan Surat Elegan -->
        <div id="letter-box">
            <h1>Good Night, Keysia</h1>
            <div class="text-content" id="typed-text"></div>
            <div class="closing" id="closing-text">I love you, always. 🤍</div>
        </div>
    </div>

    <script>
        // Kata-kata romantis, tulus, dan dewasa (Gak alay)
        const message = "Terima kasih untuk hari ini ya, Keysia sayangku, cintaku, manisku. Hari ini kamu sudah melangkah dengan hebat. Sekarang, saatnya tubuh dan pikiranmu beristirahat sepenuhnya. Lepaskan semua lelahmu malam ini. Tutup matamu perlahan, bbo yang nyenyak ya. Semoga tidurmu tenang dan malammu dipenuhi dengan mimpi-mimpi yang indah.";
        
        let index = 0;
        const speed = 40; // Kecepatan efek mengetik teks (ms per karakter)

        function typeWriter() {
            if (index < message.length) {
                document.getElementById("typed-text").innerHTML += message.charAt(index);
                index++;
                setTimeout(typeWriter, speed);
            } else {
                // Munculkan kalimat penutup setelah teks selesai diketik
                document.getElementById("closing-text").style.opacity = "1";
            }
        }

        function revealLetter() {
            document.getElementById('start-box').style.display = 'none';
            const letter = document.getElementById('letter-box');
            letter.style.display = 'block';
            letter.style.animation = 'fadeIn 1.5s ease-in-out forwards';
            
            // Mulai efek mengetik & animasi hati
            setTimeout(typeWriter, 500);
            setInterval(createHeart, 400);
        }

        // Fungsi membuat animasi gelembung hati mengapung lembut
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            
            // Variasi bentuk (ada hati, ada kilauan bintang mini)
            const shapes = ['❤', '✦', '🤍'];
            heart.innerText = shapes[Math.floor(Math.random() * shapes.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's'; // 4 - 7 detik biar lambat anggun
            heart.style.fontSize = Math.random() * 10 + 12 + 'px'; // Ukuran kecil elegan
            
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 7000);
        }
    </script>
</body>
</html>
