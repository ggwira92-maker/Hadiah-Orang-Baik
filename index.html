<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You, Keysia</title>
    <style>
        :root {
            --bg-dark: #03040e;
            --pink-glow: #ff4d6d;
            --blue-glow: #38bdf8;
            --text-light: #f1f5f9;
        }

        body {
            margin: 0;
            padding: 0;
            /* Background yang lebih dinamis dan istimewa */
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #03040e 100%);
            color: var(--text-light);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* Overlay tekstur untuk kesan premium */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2;
            pointer-events: none;
        }

        canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            z-index: 10;
            padding: 20px;
            width: 85%;
            max-width: 420px;
        }

        .aesthetic-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 36px;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.5s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .aesthetic-btn:hover {
            border-color: var(--pink-glow);
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.4);
            transform: translateY(-2px);
        }

        #letter-box {
            display: none;
            background: rgba(7, 10, 25, 0.5);
            backdrop-filter: blur(25px);
            padding: 40px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 50px rgba(255, 77, 109, 0.05);
        }

        .profile-frame {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--pink-glow), var(--blue-glow));
            margin: 0 auto 25px auto;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.3);
            opacity: 0;
            transform: scale(0.8);
            transition: all 1s ease 0.3s;
        }

        .profile-inner { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; }

        h1 {
            font-size: 26px;
            background: linear-gradient(90deg, #ff758f, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .text-content {
            font-size: 15px;
            line-height: 1.9;
            color: #e2e8f0;
            text-align: center;
            height: 180px;
            overflow-y: auto;
        }

        .closing {
            margin-top: 30px;
            font-size: 14px;
            color: var(--blue-glow);
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>
    
    <!-- Musik Nidji -->
    <audio id="bgMusic" src="Rahasia Hati - NIDJI LIRIK.mp3" loop></audio>

    <div class="container">
        <div id="start-box">
            <p style="color: #64748b; letter-spacing: 4px; margin-bottom: 30px; font-size: 12px;">A SPECIAL MESSAGE</p>
            <button class="aesthetic-btn" onclick="revealLetter()">Buka Untukmu</button>
        </div>

        <div id="letter-box">
            <div class="profile-frame" id="user-photo">
                <div class="profile-inner">
                    <video src="VID-20260524-WA0007.mp4" autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
                </div>
            </div>
            
            <h1>Good Night, Keysia</h1>
            <div class="text-content" id="typed-text"></div>
            <div class="closing" id="closing-text">I love you. Always. 🤍</div>
        </div>
    </div>

    <script>
        const message = "Keysia, malam ini aku ingin menyampaikan sesuatu yang mungkin jarang terucap. Terima kasih sudah menjadi bagian dari hariku, menjadi alasan untuk aku tersenyum kembali setelah hari yang panjang. Kamu hebat hari ini, dan aku sangat menghargai setiap langkah yang kamu buat. Sekarang, istirahatkan dirimu, biarkan malam ini memeluk lelahmu. Tidurlah dengan tenang, bermimpilah tentang hal-hal indah, karena kamu layak mendapatkan kedamaian itu malam ini. Selamat istirahat, sayang.";
        
        let index = 0;
        function typeWriter() {
            if (index < message.length) {
                document.getElementById("typed-text").innerHTML += message.charAt(index);
                index++;
                setTimeout(typeWriter, 55);
            } else {
                document.getElementById("closing-text").style.opacity = "1";
            }
        }

        function revealLetter() {
            document.getElementById('bgMusic').play();
            document.getElementById('start-box').style.display = 'none';
            const letter = document.getElementById('letter-box');
            letter.style.display = 'block';
            document.getElementById('user-photo').style.opacity = '1';
            document.getElementById('user-photo').style.transform = 'scale(1)';
            setTimeout(typeWriter, 1000);
            setInterval(autoFirework, 1500);
        }

        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let particles = [];
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 4 + 1;
                this.velocity = { x: Math.cos(this.angle) * this.speed, y: Math.sin(this.angle) * this.speed };
                this.opacity = 1; this.fade = 0.01; this.size = Math.random() * 5 + 3;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
            update() { this.x += this.velocity.x; this.y += this.velocity.y; this.velocity.y += 0.05; this.opacity -= this.fade; }
        }

        function autoFirework() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height * 0.4;
            for (let i = 0; i < 15; i++) particles.push(new Particle(x, y, ['#ff4d6d', '#38bdf8', '#ffffff'][Math.floor(Math.random()*3)]));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.opacity > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
