<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klaim Hadiah Anda!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        #tombol-box {
            display: block;
            padding: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.5);
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        /* Tampilan Layar Horror */
        #scary-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 20px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            background-color: #000;
            animation: flashRed 0.1s infinite alternate;
        }
        /* Efek tulisan CELLOZ nge-glitch seram */
        .scary-title {
            font-size: 60px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000, 0 0 30px #000;
            letter-spacing: 8px;
            animation: glitch 0.15s infinite;
            margin: 0;
        }
        .scary-subtitle {
            font-size: 18px;
            color: #ffffff;
            margin-top: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px #000;
        }
        /* Animasi kedip merah hitam bikin pusing */
        @keyframes flashRed {
            0% { background-color: #000; }
            100% { background-color: #1a0000; }
        }
        /* Animasi getar teks */
        @keyframes glitch {
            0% { transform: translate(3px, 3px) skewX(0deg); }
            20% { transform: translate(-3px, -3px) skewY(5deg); }
            40% { transform: translate(1px, -1px) skewX(-5deg); }
            60% { transform: translate(-2px, 2px) skewY(0deg); }
            80% { transform: translate(2px, -2px) skewX(2deg); }
            100% { transform: translate(-1px, 1px) skewY(-2deg); }
        }
    </style>
</head>
<body>

    <!-- Layar Pancingan Awal -->
    <div id="tombol-box">
        <h2>🎁 GIVEAWAY SPESIAL UNTUKMU!</h2>
        <p>Ketuk tombol di bawah untuk klaim hadiah Anda:</p>
        <br>
        <button onclick="mulaiPrank()">KLAIM SEKARANG</button>
    </div>

    <!-- Layar Seram CELLOZ -->
    <div id="scary-screen">
        <h1 class="scary-title">CELLOZZ</h1>
        <p class="scary-subtitle">SEDANG MEMANTAU ANDA...</p>
        <p style="font-size: 13px; color: #888; margin-top: 40px; line-height: 1.5;">
            SISTEM ANDA TELAH DIALIKAHKAN.<br>
            JANGAN MENCOBA UNTUK KELUAR!
        </p>
    </div>

    <script>
        function mulaiPrank() {
            // Sembunyikan tombol pancingan, munculkan teror CELLOZ
            document.getElementById('tombol-box').style.display = 'none';
            document.getElementById('scary-screen').style.display = 'flex';

            // Getar brutal berulang setiap 1 detik
            setInterval(function() {
                if (navigator.vibrate) {
                    // Pola getar panjang-pendek-panjang yang sangat terasa di tangan
                    navigator.vibrate([500, 100, 500, 100, 800]); 
                }
            }, 1000);
        }
    </script>
</body>
</html>
