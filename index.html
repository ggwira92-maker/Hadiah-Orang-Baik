<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pembaruan Android</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            user-select: none;
        }
        .loader {
            border: 5px solid #333;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .warning {
            color: #ff3333;
            font-weight: bold;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body onclick="aktifkanGetar()">

    <div class="loader"></div>
    <div style="font-size: 18px; font-weight: bold;">Mengunduh Pembaruan Sistem Kritis...</div>
    <div id="persen" style="font-size: 24px; margin-top: 10px; font-weight: bold; color: #3498db;">1%</div>
    
    <div class="warning">⚠️ JANGAN MATIKAN PERANGKAT ATAU MENCET TOMBOL APAPUN!</div>
    <p style="color: #888; font-size: 12px; padding: 0 20px;">Pembaruan ini memerlukan waktu beberapa menit. Kegagalan sistem dapat menyebabkan kehilangan data permanen.</p>

    <script>
        let persen = 1;
        const persenEl = document.getElementById('persen');

        // Angka persenan naik lambat banget biar korban nungguin sambil panik
        const intervalPersen = setInterval(() => {
            if (persen < 99) {
                persen += 1;
                persenEl.innerText = persen + "%";
            } else {
                // Mentok di 99% dan stuck di sana selamanya
                persenEl.innerText = "99% (Sistem Corrupted)";
                persenEl.style.color = "red";
            }
        }, 3000); // Naik setiap 3 detik

        // Efek getar mengejutkan tiap kali layar disentuh
        function aktifkanGetar() {
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200, 100, 500]);
            }
        }
    </script>
</body>
</html>
