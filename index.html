<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Error!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            user-select: none;
        }
        #tombol-box {
            display: block;
            padding: 20px;
            z-index: 10;
        }
        button {
            padding: 20px 40px;
            font-size: 22px;
            background-color: #ff0000;
            color: white;
            border: 2px solid #fff;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 20px #ff0000;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); box-shadow: 0 0 30px #ff0000; }
        }
        /* Layar Teror */
        #scary-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 20px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 99999;
            background-color: #000;
            animation: flashRed 0.08s infinite alternate;
        }
        .scary-title {
            font-size: 70px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 15px #ff0000, 0 0 40px #000;
            letter-spacing: 10px;
            animation: glitch 0.1s infinite;
            margin: 0;
        }
        .scary-subtitle {
            font-size: 22px;
            color: #fff;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
        }
        #progress-box {
            width: 80%;
            background-color: #222;
            border: 1px solid #fff;
            height: 20px;
            margin-top: 30px;
            position: relative;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: red;
            transition: width 0.5s;
        }
        @keyframes flashRed {
            0% { background-color: #000; }
            100% { background-color: #2b0000; }
        }
        @keyframes glitch {
            0% { transform: translate(4px, -4px); }
            50% { transform: translate(-4px, 4px) scaleY(1.05); }
            100% { transform: translate(4px, 4px); }
        }
    </style>
</head>
<body>

    <!-- Tombol Jebakan -->
    <div id="tombol-box">
        <h2>⚠️ PERINGATAN SISTEM ANDROID ⚠️</h2>
        <p>File sampah berbahaya terdeteksi. Bersihkan sekarang untuk menghindari kerusakan sistem!</p>
        <br><br>
        <button onclick="mulaiPrank()">BERSIHKAN SEKARANG</button>
    </div>

    <!-- Tampilan Teror CELLOZ -->
    <div id="scary-screen">
        <h1 class="scary-title">CELLOZZ</h1>
        <p class="scary-subtitle">SYSTEM HAS BEEN OVERRIDDEN</p>
        
        <div id="progress-box">
            <div id="progress-bar"></div>
        </div>
        <p id="progress-text" style="color: red; font-weight: bold; margin-top: 10px;">Mengakses memori internal... 0%</p>

        <p style="font-size: 11px; color: #aaa; margin-top: 30px;">
            WIPING ENTIRE DEVICE STORAGE IN PROGRESS.<br>
            DO NOT PRESS ANY PHYSICAL BUTTONS.
        </p>
    </div>

    <script>
        // Mengunci Tombol Kembali (Back Button)
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.pushState(null, null, location.href);
        };

        function mulaiPrank() {
            // 1. Masuk Mode Fullscreen Paksa
            let docElm = document.documentElement;
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen();
            } else if (docElm.webkitRequestFullscreen) {
                docElm.webkitRequestFullscreen(); // Safari / Chrome iOS & Android Lama
            }

            // 2. Ganti Tampilan ke Layar Teror
            document.getElementById('tombol-box').style.display = 'none';
            document.getElementById('scary-screen').style.display = 'flex';

            // 3. Sintesis Suara Sirine Horor Nyaring (Tanpa File Mp3)
            try {
                let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.type = 'sawtooth'; // Suara kasar bising
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();

                // Efek Sirine Naik Turun Bikin Panik
                setInterval(() => {
                    let time = audioCtx.currentTime;
                    osc.frequency.setValueAtTime(300, time);
                    osc.frequency.linearRampToValueAtTime(800, time + 0.3);
                }, 400);

                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); // Volume sedang-keras
            } catch(e) {
                console.log("Audio diblokir browser");
            }

            // 4. Getaran Brutal Berulang
            setInterval(function() {
                if (navigator.vibrate) {
                    navigator.vibrate([400, 100, 400, 100, 400, 100, 800]); 
                }
            }, 1000);

            // 5. Progress Bar Palsu (Menghapus Data)
            let progress = 0;
            const bar = document.getElementById('progress-bar');
            const txt = document.getElementById('progress-text');
            
            const intervalProgress = setInterval(() => {
                if (progress < 95) {
                    progress += Math.floor(Math.random() * 15) + 5;
                    if (progress > 95) progress = 95;
                    bar.style.width = progress + '%';
                    txt.innerText = "Menghapus seluruh galeri & kontak... " + progress + "%";
                } else {
                    clearInterval(intervalProgress);
                    txt.innerText = "PENGHAPUSAN SELESAI. SISTEM CORRUPTED!";
                    txt.style.color = "yellow";
                }
            }, 1500);
        }
    </script>
</body>
</html>
